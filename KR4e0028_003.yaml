body:
  text: 跋張孟兼白石山房詩卷義門鄭淵古人未嘗欲隱也其忠不行然後放情肆志於烟霞泉石間蓋不得已也同邑張君孟兼築室白石山中為讀書之地其志豈欲隱哉蓋欲養其所學以適當世之用耳方今明良相逢千載一時孟兼負其所學幡然而起亦既施教成均主事祠曹幼學壯行之志將于是而展焉行見道德文章衣被後學上承聖天子之寵光是則白石山房將藉之而有餘榮其視指終南為捷徑者皆見棄於吾孟兼孰得孰失當必有辨之者矣
