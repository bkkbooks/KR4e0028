body:
  text: 明張丁撰郊禋慶成分得霄字四十韻宋太史濂序附皇帝自登大寶主百神即有事於昊天上帝以仁祖淳皇帝配神作主於今五載弗懈益恭粵洪武壬子冬十一月辛酉日長至復遘其時前期丙辰上御奉天殿集臣工於庭告以誓命戊午出宿齋宮有司汜掃反土鄉為田燭各戒具修罔敢弗肅及期行事百辟卿士後先駿奔牲牷肥腯圭幣溫緻器用質雅酒齊苾芬樂舞具奏升禋上聞皇心內外質文兩盡上帝居歆福祿攸降既竣事禮部尚書陶凱工部尚書黃肅工部侍郎牛諒晉府參軍熊鼎磨勘司令吳雲兵部郎中劉嵩工部主事周子諒祕書監丞陶誼晉府録事張孟兼吳府録事吳從善咸謂皇帝升中於天國之大典幸際熙明與於執豆籩之列不可無篇什以紀慶成昭示萬世遂以唐詩星臨萬戶動月傍九霄多為韻各賦詩一章而屬濓序之濓聞郊社之禮始於有虞氏至周大修秦漢以來寖涉不經且惑於六天六帝之説莫之適從君國子民者亦罕能躬嚴祀事往往遣大臣攝之肆惟皇上一據禮經而洗千古之陋每嵗親升泰壇昭事上帝恪恭寅畏有赫其臨隂斂陽舒降甘風雨覃及寰宇物無疵癘行見鳯凰降而龜龍假矣聲歌之發兹非其時乎昔者周人之誦所謂昊天有成命者郊祀天地也思文者后稷配天也二詩詞氣奧密卒未能曉然非卜商之序揚其宏綱後世何自而明之羣公之什優柔而雅馴整肅而泰豫足以美盛德形容而告於神明善言詩者謂其有得詩人之微旨所可愧者濓非卜商之識僣序作者之意君子其謂斯何雖然一代之成憲後王之所取法者其大槩亦頗著見於間云是嵗十有二月甲戌朔金華宋濓謹序后德綿昌厯天心翊聖朝邊塵初滌蕩雲漢已光昭削僣功尤烈來王化愈遙金陵誇地險玉燭羡時調甘露諸祥集嘉禾兩岐天升中酬昊帝殷薦配神堯五稔明禋肅千官縟禮饒嵗將纒赤奮斗正指玄枵大報儀應飭長迎意更邵澤宮申誓命宣室稟章條法鼓雞人呌巾車太僕要祝融驅汜掃太乙引招搖矗矗旌常建祁祁旟斾飄三輿尊木輅八騄重華聊貔虎揚璇蓋神仙捧玉雕清飈傳警蹕紫陌覘沖鞗爾乃登壇履因之寀殿超衮衣披日月皮辨映星杓薌合羣供焫鸞刀衆啓膋貴誠呈繭栗尚質薦陶匏圭璧繽紛奠尊罍雜沓標大糦承黍稷廣樂備雲韶孤竹璚笙麗空桑錦瑟嘹九成看舞翟六變聽懸毊祝已將明信巫還告腯臕文真情並至儀果物俱遼聖慮尤旡射臣心總不佻焄蒿神自凛肸蠁祉靡料烈祖咸蒸衎羣神遍悅嗂德馨瀰紫府仁饗徹丹霄天既齋明假人因頌祝囂百昌歌日彩萬夀禱松喬景福穰穰降神休疊疊徼祥光凝輦轂協氣靄鑾鑣順備尤磅礴清寧更泬寥尊親懷血氣作睹罄英翹嘉瑞麟遊藪雍喈鳯叶簫九圍精意塞重譯雅聲招允矣三靈答悠哉百沴消愚臣叨相禮諧尹繼𢋫謡夜坐國學玉泉聫句宋太史濓序附洪武五年秋九月十又五日日入酉豫與仲子璲過張録事孟兼於成均秉燭對夜孟兼方命侍史汲玉泉瀹茗俄熊參軍鼎劉職方嵩周虞部子諒皆集相與談詩至愜心處輒抵掌笑譁呂太常仲善聞之亦歡然來會既啜茗已孟兼出新造玉兔泉銘諷之且曰今夕何夕勝友如雲不可無以為娛請舉泉聫詩何如衆皆曰然豫年有一日之長俾題其首句餘則以次而續鬬竒據勝閧閧弗能休至二鼓詩成各擁衾枕榻逮雞再號風雨凄迷僕夫載塗官事有程皆不告而散豫亦騎驢去朝天矣明日孟兼將屬梓遂作小楷繫詩於銘左徴豫為之引於戲人事聚散如風中飛矢其回旋飄泊曷嘗有一定之蹤今幸得與二三君子岸幘咏詩輾然一笑豈非天哉然此七人之中楚産者大半獨豫父子與孟兼居越西相距僅半舍他時或後先投簮而歸支九節笻訪孟兼白石山房溯泳諸賢立霄漢上欲一見不可得取此卷閲之恍如聚首成均時寧不有慰於寂寥之鄉也耶孟兼子諒皆以字名熊君字伯頴劉君字子髙豫則南宫散吏金華宋濓也成均地何靈聖澤資灌沃濓奔兆竒徴井泄廢新斸鼎自非三窟深孰湛一川緑孟兼儲精本從金生色絶勝玉子諒霜毛蘸寒飲雪毳翻夜浴嵩釀冽補酒經沐丹驗仙籙仲善杵㫪蟾窟棄珠噴鱣堂觸璲字月生隂精觀天漏晴旭濓氷澄毛骨竪鑑徹鬚眉燭鼎㕙名徒自竒繪行穢難贖孟兼雖涵東郭狡難洗上蔡辱子諒引滿瓶未羸探幽綆頻續嵩流罌滲銀牀出竇濺瓊粟仲善醉沃目暈花凍汲指連瘃璲濡毫乃目潤照影從人欲濓光沈天上魄祥啓地中躅鼎摛辭挹餘清盟薦侑嘉告子諒劍刺非二師池移豈身毒孟兼燕支愧浮陳鹽鹵鄙富蜀嵩不動疑窪雪頻移風笑纛仲善天光一眼開雲影片鱗束璲劇燕覺瘮瘭蹶足想彳亍濓觱沸虎爪跑㪺吸猿臂局鼎潔士濯纓冠濁卒卸刀襡子諒情當昴君降夜或井霜督孟兼誰知鍾阜分脈與伊洛屬嵩錫名爾固嘉戰句吾何局仲善聫將指鼎比疾勝擊鉢促璲驚風落燈燼斜月墜簷曲靈源詎能窮短詠聊可録濓題義門丁嘗因潛溪先生發交于前太常博士鄭君仲舒仲舒之文閎通博大汪洋無溪然一裁於理嘗語丁以為文之道必根忠孝性情之實而發然後可傳傳斯永久時丁初知為文仲舒一見竒之許以有成丁兹受知聖天子致榮膴纍顯官於丈焉賴歸省邱隴道經義門謁仲舒之廬而宿焉仲舒間示丁義門詩卷皆宇內巨公名文丁反覆詳玩赧焉瞪乎其後乃聖天子澄清海甸廣勵學宫𢎞宣教鐸亟取君家義範垂示來兹綸恩指日下矣丁賦短歌書之末簡顧丁言何足為義門重庶丁名得藉義門以貽不朽爾里人張丁孟兼拜手書孝不遺厥親義不辭君役克全兹兩端稔足久雍睦世俗習澆漓君家仍朴遫世俗尚浮屠君家尊儒宿文章夙擅名道義素積蓄覃恩表閭門用是敦頽俗末學勉追隨步趨恐不足漫作短歌行聊以將頌祝寄桃源鄭徴士豫往山中時賦詩寄桃源鄭徴士有云桑麻别境仍雞犬曉夜空山自鶴猿今來江左每懷舊趣而不可得乃以二句析之為韻賦古體十四首首六句覔便寄之且以表豫之思云爾桑字我思桃源山林谷春晝長雲生岩石靜花落泉水香笑我不歸客何年返耕桑麻字何年返耕桑與子種桃花山中尋白鹿石上看紅霞竟日得辭后相從飯胡麻别字相從飯胡麻已與塵事絶致身在煙霞此心比冰雪便當賦歸來共話經年别境字共話經年别令人發深省悠悠感飄蓬戀戀依鄉井漫爾結茅屋遁迹桃源境仍字遁迹桃源境日對青崚嶒澗響驚夜雨雲寒沍春冰况此人事絶沈憂豈相仍雞字沈憂豈相仍浩然樂幽棲山空夜花落木密春鳥啼我厭朝市居攬衣起聞雞犬字攬衣起聞雞寤寐恆展轉懷親念已頻覲主顔覺靦欲尋舊籬落聽吠山家犬曉字聽吠山家犬煙霞故深窈上拂穹宇髙下俯人寰小泠然風露涼落月林開曉夜字落月林開曉白雲散幽舍翩翩笙鶴回井井神仙下中有好修人浩歌美清夜空字浩歌美清夜翩翩挾天風采芹碧澗底看奕青雲中洞口有霜瀑飛流落晴空山字飛流落晴空青雲上可攀念子氷雪姿愧我塵土顔長歌采芝曲白雲滿前山自字白雲滿前山杳杳入蒼翠風清鶴在林夜靜月墮地惟有屋下泉汨汨來何自鶴字汨汨來何自泉鳴晝寂寞春暖澗草生鳥弄林花落山人盍歸來為伴林間鶴猿字為伴林間鶴松老枝葉繁石爛不復覺丹成竟忘言幽響亦何處雲蘿自啼猿送童良仲歸蘭溪嘗讀登科記猶憶庚子年君名乃亞魁衆口爭稱傳豈惟宗黨重亦為閭里賢授官得要地尚爾客幽燕音書或間至途路動逾千不謂兵革起陵谷成變遷南北遂阻隔相望各一天我思曷怏睹心若搖旌懸君世居蘭溪我家浦水邉相去固甚邇雞犬聲相連胡為萬里别不啻參商然人生出處異會晤實因緣去年朔方平君挈家南還相逢逆旅中把手話纏綿江城寒雨歇泥淖窮巷偏促席竟及夕剪燭夜忘眠或於風雪際圍爐擁青氊哦詩出險語欲壓石鼎聫君才十倍丕顧我何能先譬諸粗糲女效顰愧妖妍又如低飛鳥斂翮避鷹鸇此情膠漆投此義金石堅還返僅半載慰藉肯棄捐興言久居此浩然鄉思牽今日既得請促裝買歸船功名非吾事身世圖生全故山有敝廬讀書可終焉昔有釣遊處西郊及東阡鄰翁縱談謔嵗時羅酒筵非學髙尚隱實且脫憂煎聞之使我驚我亦思林泉我生素狂瞽竊祿徒備員幾欲乞歸養日夕心乾乾念君挽莫留告别一何遄探囊竟何有憐剩三百錢沽酒勸君飲為君寫拳拳蒸雨急如洗薰風爽微肩到家可計程定及秋月圓送鄭叔車還鄉蘇太史平仲序附浦江義門鄭君仲舒北仕於燕二十有餘年不聞問亦且十年仲舒之子叔車居常皇皇如也王師既下燕叔車即告行於尊長往迎方燕之下也凡在仕籍者徙而處之汴京者有之徙而處之兩淮者有之挾而致之南京者有之而蹤迹仲舒之所之言人人殊或言南京或言兩淮或言汴京又或言於時仲舒已解官不在行間仍留燕也然言之南京者十五六從者惑於所之叔車曰古人之尋其親也無方而獲見焉者多矣况我父有方乎燕也汴也淮也南京也吾無不之焉則吾父當無不見焉又奚惑乃行行次京口遣從者走南京訪焉比從者至於南京則仲舒之於南京也二日矣方卧病逆旅從者以告叔車叔車兼程而至仲舒見而悲悲而喜喜而不知病之去體也內交於仲舒之士僉曰仲舒幸哉有子如此真無忝義門子弟哉余竊以為叔車之來子職也而其事則殆有隂隲之者使叔車竟絶江如淮如汴如燕不先之以從者如南京至不至從何而知之先之以從者矣使仲舒之至也後一二日則叔車亦且如淮如汴如燕矣叔車行萬里外而仲舒客南京卧病而愁居左右就養將仰之誰哉今仲舒甫息肩弛擔而從者遄至乃若期然叔車遂得共為子職仲舒享其養而安焉此非人也天也明年春仲舒謀歸拜其先人墓勿克命叔車代之行張孟兼氏與叔車居同邑且親喜其能子也為詩以餞之率諸縉紳和之而屬余序之晚秋氣始肅逺客早知寒登艫越重河長路浩漫漫鄭君去故國水宿更風飱因兹搆沈綿伏枕在江干昔年仕朝簮濟濟儀鵷鸞有子長階庭娟娟秀芝蘭兵壓隔溫凊恨不生羽翰流言日紛起念之熱肺肝燕山尚氷霰汴水猶波瀾既憂滫瀡闕復恐衣裳單未知親定所豈悼行路難願學朱夀昌厯訪遍川蠻望雲朝屢悵見月宵永歎睽違十五載夢寐何時安一旦遇中途兩恨共相看阿兒悲且喜揾淚不能乾阿父病隨愈傾倒為汝歡細詢盡故舊相語夜向闌幾人亂離後骨肉能爾完况乃四十指舉族無一殘會當返故里髙堂舞斑斕因事尚留滯遣子先往觀急歸報尊長庶使衆心寬忝豫同鄉邑羡伊子職殫移忠諒由孝踵美登王官荆花既燁燁桂樹亦團團好將丹一寸書入青琅玕送鄭仲宗聽宣客裏論心緒山中有隱居每聽深竹雨還釣碧川魚翻笑歸難得多緣計不踈好將天上語子細報鄉閭咏茶金華之茶産於龍門者為最佳龍門宋太史讀書處也佳品龍門産先春長碧芽瀹泉分玉乳烙火試雲花沁入詩脾瘦香清夢境賒相如故病渴飲啜轉風華過梅節悠故宅梅溪尚可作吾亦溯微湍力罷千金括謀回萬乘鑾孤忠殉社稷亂石葬衣冠依約曽棲處楓邱血尚丹登聚寶山分韻得春字蹤迹憐身拙登臨縱目頻江山如好客花烏故餘春落落行藏異悠悠歲月新數莖初白髮朝夕為思親西洲曲送郎下西洲畏儂不回顧恨煞浪頭風轉向煙中樹煙樹冷茫茫風來吹斷腸贈我雙環鐲不如置道傍金華洞天洞天萬仞落空翠神仙何年上青霄蛟龍已去荒窟宅雞犬無聞遺井瓢氷湍灑灑暗猶落巖雪陰陰春不銷我欲乘風問生術林間黃精深雨苖北山草堂草堂面面近嶙峋白石蒼苔不染塵澗瀑倒吹千嶂雨山花遲發半巖春雲封竹戶常無徑僧到斜陽可結鄰松下茯苓今已老那堪車馬誤間身題鞠隱堂卷玉雪為顔白髮鮮兒孫滿眼見曾玄彩衣獻夀三春酒黃菊當期九月筵天上蟠桃今已熟堂隂萱草故爭妍丹青解寫名門德留取家聲奕世傳展聞人先生墓聞人先生孟兼受業先師也往拜墓側詩以哀之免魄何年掩少微裴回馬鬣涕頻揮十年燈火人何在一代文章事已非衰草含煙天漠漠空林落葉雨霏霏傷情更有山陽笛吹徹梅花未忍歸秋興白露盈盈上碧枝蒹葭正老月明時危樓獨倚聽歌細靜榻孤眠琢句遲厯亂松棲烏夢幻縱橫楓落鹿蹤迷琅玕戞玉千竿外疑有髙人住水湄都中贈風鑑僧祖師相法此心通西笑長安只向東自我作災還作福與人言孝復言忠看得定時原不定悟來空處轉非空八識田中橫七尺大家歸認主人翁漫興梨花半開夜雨催無奈李花如雪堆門前美人不見來東風楊栁吹千回青驄驕嘶金鞿銜美人二月裁春衫江頭麥秀青漸漸西湖放船開錦帆楊栁詞栁色青青栁葉齊送君江上朔雲低妾似栁條全繫恨君如栁絮逐東西槎得鵝兒嫩欲黃輕寒初試怯羅裳柔條不禁隨風舞薄恨猶能繫妾腸賦得可憐人度可憐宵燈花剔瘦鬢上蟬梭雞雨聲泣紅綿瓦盆盛水渴如漆埀額不照鴉紋玄青奩無脂陂陀小單衾著膝看霜曉飢蟲食粉化蛾飛芙蓉盡乾春燕少去年買塢種楊栁春去采芝秋縛帚荒煙碾塵髙似樹蠐螬朴墨入馬口空條漸老月漸稀月時空有雨灑衣花房遣夢化為蜜醒時不見蝴蝶飛三更食蜜如食澱寒鴉孤棲不穿線鬼母輕搖蜀國絃外孫慵貼邯鄲絹天河水決弓聲催漏板銅銷冷如箭香軿疊緑垂花鈴乙夜采蘭燒至丁忽剪茱萸作秋宛懶從鏡裏留星星龜甲無心老紅暈橫取金蠶報雙鬢鵝黃不度闕上風蠟淚新痕為誰盡補牛尾八闋樂歌辭葛天氏之世人民康乂樂由此興始教三人操牛尾投足而歌八闋考吕氏春秋頗載八闋之名然而樂辭不傳後世間有擬作率以今辭敷古題雖多昌明之氣終鮮邃穆之風乃按其時代以補為歌辭一曰載氏彼民之初生兮靡慝彼熙載兮不知不識彼一人兮操要會以立極二曰玄鳥鴯之來民迎禖矣鴯之歸民財阜矣相甲厯以制冝之子兮勤施三曰遂草木而萌肇茁而彚彌稷乃攘乃剔蕃其質中我宫室中我琴瑟四曰奮五榖種之嘉播乃畬叶音賖出而作趙其鎛倉斯千祝百年乃昭率育乃遊鼓腹五曰敬天常聿康回自神兮彼天折其柱維民彛俶亂兮疇日監而在兹乃維其斁叶音妬乃安其度六曰達地功若掘大象兮調太鴻乘精拱默兮耳目內通維率九寰以承流兮順軌從風亮天工兮一人斯隆七曰依地德彼奠而靡隳兮惟厚取財而勿匱兮惟百耕者餘餼宿隴首俾我不武法其隂德八曰總萬物之極眷羣生氣莫閼藝萬百一何轕應不求兮聚必奪紹物開智兮一物胥逹白石山房逸藁卷上
