body:
  text: 張孟兼集附錄劉伯温玉兎泉銘并序自古有以勢軋天下箝人口使和已者鮮不由細微以及大此奸人之素能也故髙之馬莽之祥瑞惟其言而莫之違然後大詐行而大欲得矣秦檜之事宋髙宗也以岳将軍之武之忠且排搆之殺其身以及其子反以為功而宋之君臣莫不從其指則亦何求而不得哉玉之泉以清美為建業城中第一豈昔顯而今堙者檜實知之耶或有善察土脈上穿井之術者密以語檜而神之以白兎耶則皆不可知也夫檜之网民設詐豈下於髙莽哉白兎之是非無闗天下之大事是故賢人君子忽之而莫與較于是乎鄙夫諂子遂探其意而誇之以為佞是益不足辯也金華張孟兼憫泉之芳潔以奸久所汚而銘以雪其寃愛物之良心也予亦悲之為之作後玉兎泉銘銘曰鳴呼泉乎夫何辜為檜所汚世無呉隠之孰昭其誣嗚呼泉乎尼父大聖猶言其主瘠環與癰疽白之傳夫何傷於爾歟檜死為蛆泉潔自如我作銘詩泉惑斯祛嗚呼泉乎終古弗渝宋景濓重題玉泉巻後泉地産初何與人事世目之為貪為盜不過藉其名以厲人行泉固自若也金陵有泉曰玉兎甘潔異常或者悼其不幸為奸檜所發或者以檜之惡無汚泉之清爭出巧辨嘵嘵不自休嗚呼安得荘生齊物之㫖語之者哉部使者張君孟兼将上山東出示此巻請重題其後題已孟兼曰先生可為調人之官矣一笑而别送部使者張君之官山西憲府序天地正氣絪緼輪囷不折不回行乎太虚在物受之則為獬廌為屈軼在人受之則為剛烈之士剛烈之士貴勢莫能加威力不能變參乎氣化闗乎治體其重於物又不翅千百焉嗚呼邪正不兩立正氣伸則邪沴廓清矣我國家始建國江左輒從泰元之請立按察司設官分職彈劾百僚所以伸正氣也迄今埀二十年憲度益嚴遴官益精有若山西僉憲張君孟兼尤號稱職者也孟兼性鯁亮不喜為依阿人有曲必面白之雖慚沮羞縮不暇顧然亦無它腸當良朋盍簮酒酣耳熱抵掌笑談胸中森然芒角必盡吐出乃已其氣衮衮不衰名上中朝選教胄子久之遷南宮奉常奉常南宫掌禮儀郊祀之事無以攄其耿耿及今出持使節知孟兼者讙曰孟兼行哉民生休戚無不得言吾見軺車夕至而封章朝上也貪賕舞法吏吾見望風畏讋解印綬而避去也民寃之不伸戾氣鬰結吾見渙然而氷釋也孟兼行哉雖然鷙鳥之揚揚不如威鳯之雝雝狻猊之彊彊不如祥麟之容容刑法之堂堂不如德化之雍雍人不務德則已茍有德焉又何憸壬之不革行哉憸壬革行正氣之復正道之行也孟兼盍於此而留意哉吾鄉先達自宋以來繡衣持斧赫赫見稱於時者凡六七人嗣芳猷而繼遐軌竊於孟兼望之孟兼行矣孟兼精於古之辭前御史中丞劉公極稱道之尤深名理之學其與李證應奉往復論性書上徹九重之聽䝉召對左掖門士林以為光榮云故葉夫人墓碣銘山西提刑按察司僉事張孟兼請余銘其大母葉氏之墓凡三年矣予時供奉詞林日以文墨事上竟弗暇為今䝉恩休致家居而孟兼亦予告省親道過於門又復以前事為屬其言極慘戚予何忍不為孟兼一銘之乎孟兼之言曰大父年踰六袠而未有孫及生孟兼具牢醴饗賢士大夫且曰吾衰矣不意垂殁之年獲抱孫焉於是賢士大夫咸起舉觴為壽未幾大父亡大母見孟兼輒泣尤愛憐之孟兼病創瘍浸淫被體晝夜啼不休大母與我母范鞠諸房中親為傅藥節宣其食與衣見其學步學言毎為喜動顔色已而嘆曰恨不令汝大父見之年十九禮宜使室始離大母左右遊學城南師事聞人先生辨析六藝采刺為篇章久之乃歸大母喜倍於前已而復歎曰恨不令汝大父見之嵗己巳朝廷下詔求賢以圖治安州縣不以孟兼為不敏交章薦之孟兼将赴京大母執孟兼手泣而言曰汝大父念汝甚唯寐忘之不幸不見汝之成立汝今欲入官當夙夜盡心以奉公上庶幾不辱於前人老身雖即瞑目無恨已孟兼謹佩服之弗敢違既至䝉恩擢國子錄轉主事儀曺遷丞奉常凡厯八春秋屢思謁告覲省動有物尼之洪武五年十一月二十日嚴君以書來曰汝大母今日終臨終無他言惟曰吾年七十又四分當死百無所歉於中獨惜不與吾孫一相見耳孟兼讀已五内分裂恨不即死相從於地下禮部尚書陶公白於丞相府遂以上聞獲還哭於墓次時大母祔𦵏大父徐山兆域距卒時已三十四日矣自時厥後孟兼出為今官尋陞山東提刑按察副使痛念祿足以充養而大母遽捐館舎䀌然傷心然非辭章無以白大母之行而洩孟兼無窮之悲焉所以不避譴呵而頻凟於執事者職是故也予聞之亦為之愴然嗚呼今何忍不為孟兼一銘之乎葉氏諱某杭之仁和人父信母某氏世以種善聞年三十歸浦陽張府君鎮初府君娶同縣陳氏無子葉氏來為之側室性慈惠柔順事陳氏如事姑復好施與逢單窶無依者捐所有物資之弗靳三族翕然稱其賢生一子垕二孫長即孟兼次善一孫女適某四曽孫鈞朝幹全予自少齡恒得驚風疾數涉阽危賴祖妣金淑人保抱擕持以全性命竊祿熈朝位躋法近常思有以發揚潜德而一時故老號稱能文辭者先後澌盡竟無從求之方戰惕不自寜而孟兼乃惓惓徴銘弗懈亦可謂知其所重而竭報本之誠者予頗愧焉嗚呼余何忍不為孟兼一銘之乎雖然孟兼以文章政事著聞當世繡衣直指威讋暴彊其大父母雖不獲見亦足以慰九泉之望銘與不銘未足深議也銘曰君子抱孫以其繼宗也斯勤斯恩奚暇計其瘝恫也珠之藏槖玉之藴璞寳之俾有終也為盤為敦光燭於外大顯厥庸也樂石勒銘樹之林塋馬鬛其封也元故一鄉善士張府君墓版文浦陽江之上有大姓曰張府君天錫字君與懿然篤厚人也自成童時輒知孝敬日趨大父母父母側問衣燠寒而進退之年既長益推錫類之仁凢親故有弗振者時卹其匱乏後懼族逺情踈築室南山麓為序拜旅飲之所長幼之節粲然不紊其於惇愛廣順之道有所賴焉然不是以為足寒食十月朔汎埽先世諸塋必厯告嗣人曰此為某府君其名行若何支系若何本末如連珠已而泣曰吾髪種種矣茍不言爾等當不知土中為何人慎識之勿使牛羊踐履其上平居正襟危坐終日不妄動即動足跡亦有恒度撫世酬物一以誠有犯之者任其轇轕兩耳如無聞尤不喜以疾言厲色加人人愈愛慕之雖僕媵亦從化俯首趨功驩欣如也及殁不問賢不肖皆歎惋悼惜有至淚下者至今語及府君猶舉手加額稱之曰長者長者云府君之裔初自清河遷已厯十有三世曽大父維大父夢龍湖之儒學正父一寜妣方氏府君生於某年月日殁於某年月日夀若干以某年月日𦵏於縣西通化鄉施禮山原配室朱氏婦道克修前卒竟合𦵏焉子三坦泰祐女四朱某石某樓鐵陳厚其婿也孫五珤福驥安慶曾孫五某某昔漢之萬石君家以孝謹聞於郡國雖齊魯諸儒質行咸自以為不及若府君為人寔有石氏之風奈何士習不古文有餘而行不逮尚有愧於齊魯諸儒又何敢望君之藩垣哉是可嘆已坦等遣從孫太常丞丁徴濓勒銘墓門濓聞至正初宗藩賢王有竒府君才者辟為營田總管府治中府君辭不赴今故不以為稱而題之曰一鄉善士張府君墓并感其事而銘之銘曰生之温守之仁發之淳行之新以飭其身以伉其門以壽其子孫髙季迪西臺慟哭詩越人謝翺嘗為宋丞相文山公之客公死之十二年登釣臺祭公以哭自為文識其哀曰西臺慟哭記東陽張孟兼特示求詩僕感其誼遂賦一首峩峩子陵臺其下大江奔何人此登髙慟哭白日昏哀哉宋遺臣舊客丞相門丞相既死節有身恥空存北望萬里天再拜奠酒尊陰雲莫飛來恍如載忠魂所哭豈窮途中抱千古寃上悲宗周隕下念國士恩凄涼當世事感慨平生言空山誰知哀惟有猴與猿豈不畏衆驚聲發不忍吞人言天有耳此哭寜不聞願因長風還吹此血泪痕往墮燕山隅一灑宿草根田橫去已逺兹道不復論作歌悼往事庶使薄俗敦書劉伯温序張孟兼文藁後龍門宋濓濓之友御史中丞劉基伯温負氣甚豪恒不可一世士常以屈强書生自命一日侍上於謹身殿偶以文學之臣為問伯温對曰當今文章第一輿論所屬實翰林學士臣濓華夷無間言者次即臣基不敢他有所讓又次即太常丞臣孟兼孟兼才甚俊而竒氣燁然既退往往以此語諸人自以為確論嗚呼伯温過矣濓以無根葩澤之文何敢先伯温今伯温之言如此其果可信耶否耶縱使伯温非謬為推讓者才之優劣濓豈不自知耶伯温誠過矣惟言孟兼之才與氣則名稱其實爾今觀所造孟兼文藁序嘉其語粹而辭達他日必耀前而光後其惓惓猶前意也伯温作土中人将二載俯仰今昔不能不慨然興懷孟兼請濓題識序後因書伯温昔日之言以表吾愧操觚之時淚落紙上洪武十年三月二十五日白石山房逸藁附錄
