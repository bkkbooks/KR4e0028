body:
  text: 白石山房逸藁卷下明張丁撰太極宫碑記浦江縣治東南不百步有宫曰太極宋嘉定乙亥間知縣錫山尤君曄以邑祝釐請禱之事逺詣廣福觀觀在仙華山下去縣十餘里許非便謀創此宫前建三清殿後敞層閎以祀星君廊廡翼如重門外闢觀者欣豫莫不起敬遂聞於朝徙仙華舊額揭焉仍命廣福觀道士徐思恭主領宫事崇真靈以居之至正戊戌罹於兵燹宫燬道士王無為乃銖纍寸積明年建三清殿又明年建門臺亡何仙去其徒王洞觀圖終先志復建東西廡既而庖庫諸室皆成凡其教之所宜有者嚴奉靡不如式飛甍偉棟金碧交輝視舊觀益有加焉於是介廣福觀夏文班謁余文記之蓋常以為天不可得而名言也以其不可得而知也故盡以示之然後日月星辰之所以昭晰風雨雲電之所以變化仰而觀之天之所以為大者無不在於是矣道家以清淨無為為教所謂太極焉者豈名其所不可名而一歸之於天者乎雖然聖人有作治具畢舉將躋億萬生民於仁夀之域生斯世者莫不遂其生養休息之期熙熙皥皥晏然樂於閭閻井陌間則太極者何往而不在乎以是求之天亦無不在矣豈非所謂歸之於天者而名言之也抑古之為仙者不擇地而處若今之所稱琳宫珍館則在於深山密林窮巖絶谷之地往往車轍馬迹所不通太極宫則在于亨衢廣市間無有深密窮絶之可名不亦古仙人之遺意歟有若王君師弟能修其學以興廢起墜為任述前人之所志可不謂之知道之士乎哉浦江之北有山曰仙華如旌旗鐵馬風井雪壁最號勝竒黃帝少女實升其上縣倚山而為治昔之所以建宮於是者夫豈偶然之故哉至若作新其舊克繼成志庸不可無述以示將來遂為之詩曰仙華之山仙上升列壁千仞虹電騰其陽作邑治所馮有宫翼然引峻嶒粵有至人道大𢎞窮索妙理非瞢瞢氤氲磅礴判未曾何有下濁清上澄陰陽闔闢姑有稱萬理各具物以承屬之至人道乃凝久視六合儔其能澤流教衍徵替興豈與人世誇雲礽地由森爽驅濁蒸百霛來降鸞鶴乘寶函玉笈差層層仙籍浩渺開金縢紅雲翠霧縈觚稜十洲三島恍在登神光逮賁猶燭燈眷令作者良匪矜聲容巍峩儼若增夀以貞石宜服膺遊禹門記禹門禹貢龍門也亦曰禹門渡兩山石立河出其中廣不百步世謂禹鑿所傳三月鯉魚上渡而為龍處也其東岸曰看鶴堂尤孤峭不可下瞰西為梁山即呂梁也北曰建極宫作於道家者流祀禹神也故刻石十餘多元名臣為文地極幽間煙雲水石之聚蟲蛇罔象之居相等桃花開時河水方顯殷聲震雷殆異境也并河之東為太史公墓墓前為廟有晉永嘉中殷濟樹碑今皆圯于河裴回良久作龍門之歌下山日已昃是日到子夏墓墓在新豐里新豐之南曰通化里即文中子講學處也問遺迹故老無存皆不得已明日得東臯子黃頰山詩東臯子文中子弟也名績字無功以琴酒自娛隱黃頰山題是詩山壁詩極幽永非唐以來人語宋熙寧初李公夀始訪其地刻石縣學因載所遊其石隂附以龍門之歌龍門兮天開河水兮天來我思古人兮何在哉禹門在今河津縣云商巫臣祠碑記維書曰在太戊巫咸乂我王家又曰在祖乙時則有若巫賢賢咸子也則巫氏父子世為商輔矣而巫咸尤見諸子百氏書夏邑有山曰巫咸頂志以咸隱於是為名頂故有巫咸祠遺甓存焉莫知其所始山麓有廟尋廢蓋宋崇寧間邑大旱禱巫咸得雨請於朝賜封王號見斷刻云洪武八年冬縣令閻畜等即其頂作新祠而以巫賢稱惟巫咸古賢臣也生而為治功在王室沒而為冥澤及後世矧能出雲為風雨而民以望嵗者望之其可謂虛也耶是宜食享其土不誣乃為作迎享送神詩使敬祀之而亦以紀其成焉詩曰巫山兮巉巉神隱兮中巖神去兮千古盍眷兮我土神化兮為雨風雲兮上下吁我民兮匪神何怙山雲兮浮浮神宅兮山之幽神降兮我留于薦兮我羞我享兮以雩匪鐘鼓兮為娛吁願我民兮不渝神享兮何之風雨兮其馳神我兮不違我望兮以思吁樂年嵗兮惟神自兹元故十二府君墳記嗚呼是惟我大父公之墳也公生於元至元戊子四月十一日卒於重紀至元庚辰七月二十日以明年十二月一日葬於徐山其葬也鄉陳箎先生為志方堂後公二十有六年祔以安人陳氏丁生也後既不及表見墓上顧思先美不傳死且不瞑目於是用悉取陳先生之志以繁其辭著兹石焉公諱鎮字安卿號平齋由始祖乾四府君至五府君四世矣自下名或闕而以行稱五府君兄弟七人子六人有十三府君子三人有五府君子一人二府君子五人一為浮屠其四遂支為東西南中𣲖云有五府君娶錢氏生省元頴中是為南𣲖于公為髙祖省元娶胡氏二子維紀維字維之娶陳安人生我博士公曲江諱夢龍娶潘夫人生曾祖諱一清字宗尚娶安人生伯祖山早世次即公也公生而倜儻遇事廓落無阿私意自未冠時即承家料理得撡縱取豫之術浸成其業有急告者不問親踈咸怡然濟之鄉豪右有非義必委曲摧阻令不得騁故毁譽每相半而公卒確行其志不少奪凛然有古任俠之風族人某早世家落有孤女煢煢旦夕莫能給公嘆曰古之人尚推其餘以濟不足况同氣耶遂以女歸與諸女居鞠之長成嫁于邑士公欲築室營遷而母卒因慟哭曰母氏勤于內治不能享一日安遽為終古之隔欲養而不可得痛忍言哉凡嵗時祭祀必泣下沾衣自免喪以至於終身無不皆然父性豪邁日具酒享賔客公侍左右有所顧欲輒下視唯唯莫勿如聽每或至夜分猶溫溫笑語未嘗告倦父亦甚愛之先是公庶弟與人小隙至誣以死事公甚慕義且能幹知其為寃之曰君輩爭利故忍以骨肉害人耶仇乃叩頭謝曰君仁人也某願乞伏改悔厥後果帖帖皆公力也公嗣與豪于甲訟田有隙值道有餓殍近大父居厚遺其尸主誣公吏亦受賕證成其獄弟亦上狀有司請以身代因得明察其姦而罪之於某鄉里稱為二難云公娶陳安人無子次葉徐姚生子四女二孫男七孫女三享年五十有三嗚呼哀哉丁初生甫晬而公疾作且呼乳者育丁撫丁之首而咳曰吾未耄恐斯疾不起得見孫乎茍有成吾願足耳及臨殁猶以為言嗚呼哀哉小子丁不能謹公之訓顧未有所就而辱公之言為甚痛尚忍云乎兹懼羣行湮沒他日無所考質姑直記所聞以俟當世盛德君子請銘焉嵗次乙已秋九月九日孫丁謹記元故勉卿府君行狀府君諱邵字勉卿生元大德癸卯八月二十七日卒至正甲辰九月四日夀六十有二以是年十一月十三日庚申祔葬祖妣安人之墓初曾大父娶于氏始生丁大父時以大父孑立寡兄弟殊不懌及得府君則釋然喜髙祖博士公見府君襁褓中嘗撫其首曰他日大吾門者耶博士公既不可作後有以博士公言告府君輒泣下性好學已而幹蠱廢筆硯尤尚本實不喜浮華恆語人今世人自稱我儒士也及觀其言行相戾不啻天淵吾不能儒但求無愧此心而已識者以為名言常題所居之壁曰仰不愧俯不怍以勵子弟謂茍能無背斯言始可為人頂立天地耳中年慕神仙家術嘗從會稽真人許旡文遊旡文得至人之學獨授以修煉之訣府君于是謝諸家事獨處一室無晝夜寒暑趺坐木榻身如稿木自是不御衾不交睫者十年其肌骨如百鍊金或按之則肅然可象故人識與不識咸稱為神仙中人先是丁大父與豪于某訟田有隙于指道上餓殍近大父居隂厚其主使誣于官大父府君兄也官為賕惑府君奮身不顧叩大父上狀乞以已代已而得明其非罪而罪于某鄉里咸稱府君之賢府君狷介剛正無阿獨意其樹立有卓然不可撓者尤放浪形骸凡事不介蒂於胸臆嗜酒口不談塵世事惡論人臧否遇飲經醉大笑而已俄而寒疾作既愈十日再作又十日竟逝矣先娶方氏次娶鄭生子五人長宴次庸為石峽書院山長次隆次雷次址女二長適于次適洪嗚呼府君無恙時執丁手而語曰汝稍以文墨見稱我死汝其狀我丁不敢背謹用列此大概道記其行仍書為兩通一焚諸兆前一藏諸家匱俟當代盛德君子尚乞文焉元故賢十九聘君行狀府君諱天錫字君豫自先清河復遷之祖至府君十三世矣曾大父諱維字維之隱德弗耀大父諱夢龍字曲江仕元為湖州路學正父諱一寧字宗望娶方氏生府君兄弟凡四人府君其長也府君性至溫謹懷親鄰咸有恩人皆稱為長者其讀書則求大義不事章句養親未嘗去左右朝夕問起居寒燠損益其衣服大父甚鍾愛之及長善理家政而無闕失弟妹皆撫育之或築室俾其營遷先是世居南山之麓去今居五里許府君以宗姓衆多懼異時不恆聚見乃造廳事故基遇嵗時集長幼序拜其間尤敦於宗親有不給者濟之嘗曰以吾身論之皆吾祖宗所分忍自飽暖乎春秋祭掃先塋禮畢率其子弟列序兆前告之曰某府君葬于斯平生修其德行其善娶某氏生某子言卒必泣下曰汝等謹識之為人極和易一以誠接物或不知而忤之者輒不與較故人亦愛敬而不忍欺每平居正衣冠坐堂上嚴恪端肅若無人者行步不東西顧視蹤迹皆可尺寸數遇僮僕未嘗厲聲色執勤服勞者皆欣欣如也時宗藩有竒府君才者辟為營田都總管府治中辭不赴至正末鄰盜羣起將入縣境鄉里亦乘間竊發燬人室廬獨府君之居相戒不敢犯後府君卒已久鄰里旄倪猶喃喃不忘一語及府君必舉手加額甚至有灑泣者府君生於元至元壬辰正月十五日卒于至正庚子四月二十日夀六十有九娶朱氏夫人亦生于壬辰四月十三日先府君三年卒於丁酉十一月初五日夀六十有六合葬縣西施禮山之原子三長坦翁次泰次祜女四長適朱某夫人之姪也次適石某次適樓鐵次適陳厚孫男五曰瑶福驥安慶曾孫男八曰叔祥和禎祐禧道襗礿嗚呼哀哉丁於府君為從孫府君在時丁數從過先世墓下語以前人往事丁聞知為尤詳迄今言猶在耳而府君已殁矣慨想羣行不白于後世直記其大略將求當代立言大人志之以圖不朽云唐珏傳唐珏字玉潛會稽人也少孤能力學以明經教授鄉里子弟而養其母至元戊寅浮屠總統楊璉真伽利宋殯宫金玉故為妖言惑主聽發之珏獨懷痛忿乃貨家具行資得白金若干為酒食隂召諸年少享于家衆皆驚駭前謂曰平日且不敢見今召我飲又過禮不審欲何為雖死不避珏因泣數行下謂之曰爾輩皆宋人吾不忍陵寢之暴露已造石函六刻紀年一字為號自思陵已下欲隨號收殯之衆皆諾中一人曰此固義舉也然今無有知者恐萬一事露祻不測不得終志奈何珏曰吾已籌之矣更當易以他骨焉衆如珏言夜往收其遺骸瘞蘭陵山後種冬青樹為識約明日復來會出金帛為諸人夀戒勿泄也璉又易宋內為諸浮屠乃裒陵骨雜馬牛枯骼築白塔號曰南鎮以為陵骨良已鎮而不知真骨之獨存也亡何汴人袁俊為越治中招珏為子師間問曰吾聞越有唐姓者瘞宋諸陵骨豈君邪坐有指珏者俊大竒之舉手加額曰先生義士豫讓不及也竊聞髙義之日久矣不意得與先生處因訊珏以故甚貧俊亟為買田宅業之先是珏卧疾一日夢吏持文來曰帝召君速之行至見宫闕邃麗一人冕旒中坐旁一人延上殿又數黃衣進揖珏曰賴收遺骸無以報俄曰苐報良田二頃有妻孥以養乃復揖及闕翻然而覺莫省謂何已而會俊料理事如夢中有謝翺者文丞相客也與珏友善嘗感珏事為作冬青樹引語甚凄苦時讀者莫不灑淚翺字臯羽閩人亦竒士贊曰豫讀晉世家知趙氏有後也非程嬰公孫杵臼莫傅其孤今十七廟不食而有暴骸之難獨珏能瘞之甚義乎哉嗚呼珏一布衣耳其視程公孫何愧哉千載而下有國士之風者非珏其誰與歸釋登西臺慟哭記登西臺慟哭記者粵謝翺之所作也宋丞相文信公值國已數起兵南服翺布衣也倜儻有大志會丞相開府時杖䇿軍門署以為咨事參軍後丞相死翺慟知已之不復故登斯臺以竹如意擊石作楚歌招其魂若其慟西臺則慟乎丞相也慟丞相則慟乎宋之三百年也西臺者子陵之西臺也始翺哭於夫差之臺句踐之國又于此升臺而哭者亦登峴踐華之意始故人唐宰相魯公開府南服豫以布衣從戎明年别公漳水湄釋曰按文公丙子七月開督于南劍時德祐二年也公時年二十八明年正月文公引兵趨漳州謀入衛道阻不通三月入梅州五月兵出梅嶺其别者是年也按稱唐魯公而不姓者猶韓愈稱董晉為隴西公之類後明年公以事過張睢陽及顔杲卿所常往來處悲歌慷慨卒不負其言而從之遊今其詩具在可考也按戊寅十月文公引兵至潮陽十一月兵潰被執遂北徙留燕至至元壬午賜死時年四十七謂其悲歌慷慨卒不負其言而從之遊者蓋指其題詩張睢陽廟也豫恨死無以藉手見公而獨記别時語每一動念即於夢中尋之或山水池榭雲嵐草木與所别處及其時適相類則裴徊顧盼悲不敢泣又後三年過姑蘇姑蘇公初開府舊治也望夫差之臺而始哭公焉按乙亥文公募公於贛州後守吳門除江浙制置使知平江府公過姑蘇而哭也在乙酉之嵗時年三十七乃落魄吳楚間始有屈平逺遊之志而其志誠可哀已又按公祭文公章貢之别言猶在耳水寒天空老目如霰其所以記别時語而不忘可知矣夫差臺在州治之西又後四年而哭之於越臺此丙戌年也按行述謂公是年過勾踐行禹窆間北鄉而泣焉時有冬青樹引别唐珏玉潛云又後五年及今而哭於子陵之臺按乙丑年公從先君鑰登臺時年始十七後丁亥公復過而哭焉謂今者在庚寅之冬時年四十二矣公之所以必記其年者蓋不忘其先後本末之事焉先是一日與友人甲乙若丙約越宿而集午雨未止買榜江涘登岸謁子陵祠憩祠旁僧舍毁垣枯甃如入墟墓還與榜人治祭具須臾雨止登西臺設主於荒亭隅冉拜跪伏祝畢號而一慟者三復冉拜起按友人甲乙若丙者意為吳思齊馮桂芳翁衡也今雖不知其然惟三人同登時詩可考見也三人者皆知公之心故與之俱而比其名者隱之之辭號慟者三蓋節之以禮也又念豫弱冠時往來必謁拜祠下其始至也侍先君焉今豫且老江山人物眷焉若失復東望泣拜不已有雲從西南來淹浥浡鬱氣薄林木若相助以悲者江山人物眷焉若失云者其乃痛宗社之隕絶乎謂昔從先君及有雲西南來云者其乃念家邑喪亡而思親之不可見乎乃以竹如意擊石作楚歌招之曰魂朝往兮何極莫歸來兮關水黑化為朱鳥兮有咮焉食歌闋竹石俱碎古之人有遭讒迸逐者或閔其魂魄離散而不復還故為辭哀之其人未嘗死也杜甫剪紙招我魂正此類也然文公既死而公以歌招之者其有得於古道焉蓋公雖哀而不過於傷而傷之在彼是皆至誠惻怛得性情之正非若婦人慟而已按朱鳥南方宿也咮鳥首也春秋傳古之火正或食於咮故咮謂之鶉火而火正配食於火星者以其於火有功故也蓋宋以火德王而繫於南化云者以其難化而化必於南文公有功於宋猶星有功於火也亦以朱鳥配於宋焉其友方鳯過公墓有詩懮之朱鳥食何向正此謂也歌闋竹石俱碎蓋哀之深而不自知也于是相向感唶復登東臺撫薈石還憩於榜中榜人始驚豫哭云適有邏舟之過也盍移諸遂移榜中流舉酒相屬各為詩以寄所思薄暮雪作風凛不可留登岸宿乙家夜復賦詩懷古相向者與客相向而悲也唶嘆聲其或有感而嘆也東臺去西臺若干步云邏舟者巡舟也移榜中流舉酒相屬為詩寄所思者蓋哭始歇而悲之未忘也亦性情之正而不為事物所移所感之心始終如一不少變而愈深此君子之心忠厚之至也至於雪作風凛雖不可留又且登岸宿乙家復賦詩懷古其於登臺之心則一而已斯可見公不忘之意也哉明日益風雪别甲於江豫與丙獨歸行三十里又越宿乃至其後甲以書及别時來言是日風帆怒駛逾久而後濟既濟疑有神隂相以著兹遊之偉豫曰嗚呼阮步兵死空山無哭聲且千年矣若神之助固不可知然兹遊亦良偉其為文辭因以逹意亦誠可悲明日者登臺之明日也别甲者别思齊於江也與丙獨歸者與桂芳同歸又明日至其居也甲後書來謂風帆怒駛蓋甲與公同氣其所見者響應若是非真有神之助也蓋公之至情逹乎中正而若有見焉其焄蒿悽愴之著也如此按嘆息謂阮步兵者此特援比其哭之一辭若公者又非其比矣豫嘗欲倣太史公著季漢月表如秦楚之際今人不有知豫心後之人必有知豫者於此宜得書故紀之以附季漢事後時先君登臺後二十六年也先君諱某字某登臺之嵗在乙丑云按公行述謂多所著書如季漢月表皆采獨行倣素之際豫未得而盡見也登臺後二十六年者在庚寅之冬其後六年公卒於杭思齊方鳯徑往杭買舟載棺至釣臺而葬焉其後會稽楊先生維禎為文以哀之而刻之墓上仍題其墓曰粵謝翺墓蓋從其初志焉余謹按文公死年四十有七今公之死也如之嗚呼惜哉後跋箕子痛殷亡過故墟而欲泣焉以為近於婦人乃作麥秀之詩以歌詠之歌詠者憂宗社之音也今翺之慟哭西臺也毋亦悼斯人之已非憫亳社之既屋義激乎中而情見乎辭又豈異於箕子歟且翺在勝國時無祿位之寄及運窮物改而能慟夫知已以及於國迹之異於箕子也然則居箕子之位者乃及不見其歌而亦不見其慟也其本心宜何如哉百世之下秉貞尚義以能發乎中心之憤憤者非翺其誰歟豫後翺之生私心景慕每誦其文多微言於是忘其愚陋本諸遺意以詳釋其記使後世知有箕子之歌於前而有翺之慟於後也雖然若翺固未可以喻於箕子也吾獨惜翺之時有箕子之位者而無翺之慟也後之秉史筆者尚庸考於斯清河張丁識釋冬青樹引别玉潛冬青樹引者宋文丞相軍門咨事參軍謝翺之所作也宋菆宫在會稽境內元楊總統欲利其金玉以宋王氣在是矯詔發之當是時山隂唐珏見諸陵已發乃䇿果夜使人收貯遺骸骨葬蘭亭之山種冬青樹為識翺珏之故人也至元丙戌入越嘗登越臺慟哭丞相故時有斯作焉自古忠臣義士所見略同若唐謝之為豈易所謂同聲相應者耶玉潛珏字也冬青樹山南陲九日靈禽居上枝釋曰山南陲者山之南邉也九日者暘谷上有扶木九日居上枝一日居下枝昔羿射日中其九日九烏皆墮惟一日焉靈禽者烏也烏者陽精也精為魄今九日居上枝者魂升其上也日者君之象也知君種年星在尾根到九泉護龍髓按至元丙子元兵入錢塘厥後楊總統易宋內為諸浮圖造白塔於興元寺徙置諸陵遺骨及天下民籍戶口其內星在尾者嵗在寅也猶唐薛仁貴為吐渾所敗嘆嵗在庚午星在降婁之類以今所言其必有不利於時者矣烜星晝隕夜不見七度山南與鬼戰烜星者常見之星隋天文志烜星者在位人君之象也夜不見猶春秋傳曰夜食之類七度未詳山南已見上與鬼戰未詳願君此心無所移此樹終有開花時山南金粟見離離白衣人拜樹下起靈禽喙粟枝上飛金粟山名昔唐玄宗至睿宗之陵見金粟山岡有龍蟠鳯翥之勢謂近臣曰吾千秋萬嵗後宜葬此今宋陵寢既獲安矣故援以比爾離離多貌言其陵之多也白衣者衣以白衣也昔燕丹送荆軻易水上賔客知其事者皆白衣冠况其有君臣之義乎靈禽即烏也杜甫拜蜀烏之魂者良有是乎後跋豫既注臯羽登西臺慟哭記又以此詩讀者未易通其詞旨故為之疏以便參考而自質焉適文獻黃先生之門人傅藻氏以書來謂聞之文獻者曰揚總統初欲利殯宫之金玉故為妖言以惑主聽而發之越中王修行一日出金帛與諸惡少衆皆驚駭而請曰平日且不敢見今乃有賜不審欲何為雖死不敢避因徐謂曰爾輩皆宋人也吾不忍陵寢之暴露已造石函六刻紀年一字為號自思陵以下欲隨號收殯爾衆皆諾遂夜往收貯遺體骨而葬種一冬青樹為識此歌詩之所為作也其説如此豫以舊注頗有異同亦既以書致鄙見於傅君矣故未即以舊聞非是而未加改定姑書一通寄傅且書來言於此以問該洽者庶幾豫言或可再正而未晚也丙午正月十日張丁識白石山房逸藁卷下
